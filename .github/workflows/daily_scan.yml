name: Deal Flow Agent

on:
  schedule:
    # Run at 6 AM UTC daily (1 AM EST / 6 AM GMT)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      rss_only:
        description: 'Run RSS feeds only (skip PE firms, SEC, bank mandates)'
        required: false
        type: boolean
        default: false

env:
  NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
  NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  STATE_FILE: .cache/deal_flow_state.json

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Restore cache from previous runs
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/
          key: deal-flow-cache-${{ github.run_id }}
          restore-keys: |
            deal-flow-cache-

      - name: Ensure cache directory exists
        run: mkdir -p .cache

      - name: Run Deal Flow Agent
        run: |
          if [ "${{ github.event.inputs.rss_only }}" == "true" ]; then
            python agent.py --rss-only --auto-confirm
          else
            python agent.py --auto-confirm
          fi

      # Save cache for next run
      - name: Save cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            .cache/
          key: deal-flow-cache-${{ github.run_id }}​​​​​​​​​​​​​​​​
