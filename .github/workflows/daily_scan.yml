name: Deal Flow Agent

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      hours:
        description: 'Lookback hours'
        default: '24'
      skip_notion:
        description: 'Skip Notion integration'
        type: boolean
        default: false
      skip_scraper:
        description: 'Skip press page scraping (faster, avoids SSL hangs)'
        type: boolean
        default: false

permissions:
  contents: write

env:
  NOTION_API: ${{ secrets.NOTION_API }}
  NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}

jobs:
  run-rss-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright && playwright install chromium --with-deps

      - name: Run Carve-Out Monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONPATH: src
        run: |
          set -o pipefail
          ARGS="scan --hours ${{ inputs.hours || '24' }}"
          if [ "${{ inputs.skip_notion }}" = "true" ]; then
            ARGS="$ARGS --skip-notion"
          fi
          if [ "${{ inputs.skip_scraper }}" = "true" ]; then
            ARGS="$ARGS --skip-scraper"
          fi
          python -m carveout_monitor $ARGS 2>&1 | tee output.log

          # Summary for job
          echo "## Carve-Out Monitor Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "Pipeline complete|Notion:|Carve-outs found" output.log >> $GITHUB_STEP_SUMMARY || echo "Run completed" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Commit state
        if: always()
        run: |
          git config user.name "carveout-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -f state.json targets.yml 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update state [skip ci]"
          git pull --rebase
          git push

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-log-${{ github.run_number }}
          path: output.log
          retention-days: 30
