name: Deal Flow Agent

on:
  schedule:
    # Run at 6 AM UTC daily (1 AM EST / 6 AM GMT)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      no_hubspot:
        description: 'Skip HubSpot integration'
        required: false
        type: boolean
        default: false
      hours:
        description: 'Lookback hours (default: 24)'
        required: false
        type: number
        default: 24

env:
  HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}

jobs:
  run-rss-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run RSS Monitor
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.no_hubspot }}" == "true" ]; then
            ARGS="$ARGS --no-hubspot"
          fi
          if [ -n "${{ github.event.inputs.hours }}" ]; then
            ARGS="$ARGS --hours ${{ github.event.inputs.hours }}"
          fi

          python rss_monitor_v2.py $ARGS 2>&1 | tee output.log

          # Summary for job
          echo "## RSS Monitor Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          grep -E "^FINAL:|^HubSpot:" output.log >> $GITHUB_STEP_SUMMARY || echo "Run completed" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rss-monitor-logs
          path: output.log
          retention-days: 7
