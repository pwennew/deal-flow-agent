name: Carve-Out Scan

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      hours:
        description: 'Lookback hours'
        default: '24'
      skip_hubspot:
        type: boolean
        default: false
      command:
        description: 'Command to run'
        default: 'scan'
        type: choice
        options:
          - scan
          - discover
          - backtest

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
          PYTHONPATH: src
        run: |
          CMD="${{ inputs.command || 'scan' }}"
          if [ "$CMD" = "scan" ]; then
            ARGS="scan --hours ${{ inputs.hours || '24' }}"
            if [ "${{ inputs.skip_hubspot }}" = "true" ]; then
              ARGS="$ARGS --skip-hubspot"
            fi
          elif [ "$CMD" = "discover" ]; then
            ARGS="discover --update"
          else
            ARGS="backtest"
          fi
          python -m carveout_monitor $ARGS 2>&1 | tee pipeline_output.log

      - name: Commit state
        run: |
          git config user.name "carveout-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json targets.yml
          git diff --cached --quiet || git commit -m "Update state [skip ci]"
          git pull --rebase
          git push

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-log-${{ github.run_number }}
          path: pipeline_output.log
          retention-days: 30
